<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Best Imports</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
  font-size:24px;
}

h2{
  margin-left:20px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  width:180px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

button{
  width:100%;
  padding:8px;
  border:none;
  background:black;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

#cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🛍️ Best Imports</header>

<h2>🧴 Perfumes</h2>
<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Yara Candy</h3>
    <p>R$ 199</p>
    <button onclick="add('Yara Candy',199)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Hawas Black</h3>
    <p>R$ 249</p>
    <button onclick="add('Hawas Black',249)">Adicionar</button>
  </div>

</div>

<h2>📦 Importados</h2>
<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Produto 1</h3>
    <p>R$ 399</p>
    <button onclick="add('Produto 1',399)">Adicionar</button>
  </div>

</div>

<!-- CARRINHO -->
<div id="cart">
🛒 <span id="count">0</span> itens<br><br>
<button onclick="finish()">Finalizar WhatsApp</button>
</div>

<script>
let cart = [];

function add(name, price){
  cart.push({name, price});
  document.getElementById("count").innerText = cart.length;
}

function finish(){
  let msg = "🛍️ Pedido Best Imports:%0A%0A";

  cart.forEach(p=>{
    msg += `• ${p.name} - R$${p.price}%0A`;
  });

  let total = cart.reduce((a,b)=>a+b.price,0);
  msg += `%0ATotal: R$${total}`;

  window.open("https://wa.me/558582241638?text=" + msg, "_blank");
}
</script>

</body>
</html>
