<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Imports</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc}
header{text-align:center;padding:40px;background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:20px}
.product{background:white;padding:10px;border-radius:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.product img{width:100%;height:140px;object-fit:cover}
.price{color:#22c55e;font-weight:bold}
.btn{display:block;margin-top:8px;padding:8px;background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white;text-decoration:none;border-radius:8px}
.admin-btn{position:fixed;bottom:20px;right:20px;background:#22c55e;color:white;padding:12px;border-radius:50%}
.admin{position:fixed;top:0;right:0;width:300px;height:100%;background:white;padding:20px;display:none;overflow:auto}
</style>
</head>

<body>

<header>
<h1>BEST IMPORTS</h1>
<p>Perfumes e performance 🔥</p>
</header>

<div class="products" id="produtos"></div>

<div class="admin-btn" onclick="abrir()">⚙️</div>

<div class="admin" id="admin">
<h3>Painel</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input id="imagem" placeholder="Imagem URL"><br><br>

<button onclick="add()">Salvar</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 SUA CONFIG (CORRIGIDA)
const firebaseConfig = {
  apiKey: "AIzaSyCPJ6tj_GJHFr_Dx8C6QC2hdILhqBpCFic",
  authDomain: "best-imports.firebaseapp.com",
  projectId: "best-imports",
  storageBucket: "best-imports.appspot.com",
  messagingSenderId: "494059335243",
  appId: "1:494059335243:web:31ed9d223d0e544f0827ce"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ⚙️ ADMIN
function abrir(){
  if(prompt("Senha:") === "1234"){
    document.getElementById("admin").style.display="block";
  }
}

// ➕ ADD
function add(){
  db.collection("produtos").add({
    nome:nome.value,
    preco:preco.value,
    imagem:imagem.value
  }).then(()=>{
    alert("Salvo!");
    carregar();
  });
}

// 🛍️ CARREGAR PRODUTOS (FOCO PRINCIPAL)
function carregar(){
  let div=document.getElementById("produtos");
  div.innerHTML="";

  db.collection("produtos").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let p=doc.data();

      div.innerHTML+=`
        <div class="product">
          <img src="${p.imagem}">
          <h3>${p.nome}</h3>
          <div class="price">${p.preco}</div>
          <a class="btn"
            href="https://wa.me/5585982241638?text=Quero ${p.nome}">
            Comprar
          </a>
        </div>
      `;
    });
  });
}

carregar();

</script>

</body>
</html>
