<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Imports</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc;color:#1f2937}
header{text-align:center;padding:40px;background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:20px}
.product{background:white;padding:10px;border-radius:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.product img{width:100%;height:140px;object-fit:cover;border-radius:8px}
.price{color:#22c55e;font-weight:bold}
.btn{display:block;margin-top:8px;padding:8px;background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white;text-decoration:none;border-radius:8px}
.admin-btn{position:fixed;bottom:20px;right:20px;background:#22c55e;color:white;padding:12px;border-radius:50%;cursor:pointer}
.admin{position:fixed;top:0;right:0;width:300px;height:100%;background:white;padding:20px;display:none;overflow:auto}
</style>
</head>

<body>

<header>
<h1>BEST IMPORTS</h1>
<p>Perfumes e performance 🔥</p>
</header>

<div class="products" id="produtos"></div>

<div class="admin-btn" onclick="abrirAdmin()">⚙️</div>

<div class="admin" id="admin">
<h3>Painel Admin</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>

<!-- 📷 FOTO DA GALERIA -->
<input type="file" id="file" accept="image/*"><br><br>

<button onclick="add()">Salvar Produto</button>

<h4>Produtos</h4>
<div id="lista"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔴 COLE SUA CONFIG FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let imagem = "";

// 📷 pegar foto da galeria
document.getElementById("file").addEventListener("change", e=>{
  let reader = new FileReader();
  reader.onload = x=> imagem = x.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// ⚙️ abrir painel
function abrirAdmin(){
  let s = prompt("Senha:");
  if(s==="1234"){
    document.getElementById("admin").style.display="block";
    listar();
  }
}

// ➕ adicionar produto
function add(){
  let p={
    nome:nome.value,
    preco:preco.value,
    imagem:imagem
  };

  db.collection("produtos").add(p).then(()=>{
    alert("Produto salvo!");
    carregar();
  });
}

// 🛍️ carregar produtos
function carregar(){
  let div=document.getElementById("produtos");
  div.innerHTML="";

  db.collection("produtos").get().then(snap=>{
    snap.forEach(doc=>{
      let p=doc.data();

      div.innerHTML+=`
      <div class="product">
        <img src="${p.imagem}">
        <h3>${p.nome}</h3>
        <div class="price">${p.preco}</div>
        <a class="btn" href="https://wa.me/5585982241638?text=Quero ${p.nome}">Comprar</a>
      </div>`;
    });
  });
}

// 🧾 lista admin
function listar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  db.collection("produtos").get().then(snap=>{
    snap.forEach(doc=>{
      let p=doc.data();

      lista.innerHTML+=`
      <div>
        ${p.nome}
        <button onclick="del('${doc.id}')">X</button>
      </div>`;
    });
  });
}

// ❌ deletar
function del(id){
  db.collection("produtos").doc(id).delete().then(()=>{
    carregar();
  });
}

carregar();
</script>

</body>
</html>
