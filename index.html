<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Best Imports</title>
</head>

<body>

<h2>Best Imports</h2>

<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<h3>Adicionar Produto</h3>

<input id="name" placeholder="Nome"><br>
<input id="price" placeholder="Preço"><br>
<input id="img" placeholder="Imagem URL"><br>

<select id="cat">
  <option>Perfume</option>
  <option>Monjauro</option>
</select>

<button onclick="addProduct()">Adicionar</button>

<hr>

<h3>Produtos</h3>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmbDy3WAMmIGrbDJHrQiC3-QX_ASzLUbI",
  authDomain: "best-imports-b25a5.firebaseapp.com",
  databaseURL: "https://best-imports-b25a5-default-rtdb.firebaseio.com",
  projectId: "best-imports-b25a5",
  storageBucket: "best-imports-b25a5.firebasestorage.app",
  messagingSenderId: "1005080108441",
  appId: "1:1005080108441:web:85184a829b26c4bda30708",
  measurementId: "G-JNJ49FPNEH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN SIMPLES */
window.login = function(){
if(pass.value === "1234"){
document.getElementById("panel").style.display = "block";
load();
}else{
alert("Senha incorreta");
}
}

/* ADD PRODUTO */
window.addProduct = async function(){

await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value),
img:img.value,
category:cat.value
});

}

/* LISTAR */
function load(){

onSnapshot(collection(db,"products"), snap=>{

let list = document.getElementById("list");
list.innerHTML = "";

snap.forEach(d=>{

let p = d.data();

list.innerHTML += `
<div style="border:1px solid #ccc;padding:10px;margin:10px">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>

<button onclick="del('${d.id}')">Deletar</button>
</div>
`;

});

});

}

/* DELETE */
window.del = async function(id){
await deleteDoc(doc(db,"products",id));
}

/* EDIT SIMPLES */
window.edit = async function(id){

let newPrice = prompt("Novo preço:");

await updateDoc(doc(db,"products",id),{
price:Number(newPrice)
});

}

</script>

</body>
</html>
