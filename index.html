<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Imports</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#7c3aed;color:white;text-align:center;padding:20px}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#22c55e;
font-weight:bold;
margin:5px 0;
}

.btn{
display:block;
padding:8px;
background:#7c3aed;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>BEST IMPORTS</h2>
<p>Perfumes e ofertas 🔥</p>
</header>

<div class="container">

<!-- PRODUTO 1 -->
<div class="card">
<img src="https://i.imgur.com/1.jpg">
<h3>Perfume X</h3>
<div class="price">R$ 120</div>
<a class="btn" href="https://wa.me/5585982241638?text=Quero Perfume X">Comprar</a>
</div>

<!-- PRODUTO 2 -->
<div class="card">
<img src="https://i.imgur.com/2.jpg">
<h3>Monjauro 15mg</h3>
<div class="price">R$ 200</div>
<a class="btn" href="https://wa.me/5585982241638?text=Quero Monjauro 15mg">Comprar</a>
</div>

<!-- PRODUTO 3 -->
<div class="card">
<img src="https://i.imgur.com/3.jpg">
<h3>Perfume Y</h3>
<div class="price">R$ 150</div>
<a class="btn" href="https://wa.me/5585982241638?text=Quero Perfume Y">Comprar</a>
</div>

</div>

</body>
</html>
