<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Estável</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
header{background:#111827;color:#fff;padding:15px;text-align:center}
.grid{display:grid;gap:10px;padding:10px}

.card{
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

#admin{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>🛍️ Loja Estável</header>

<div class="grid" id="list"></div>

<div id="admin">
<h3>Admin</h3>
<input id="name" placeholder="Nome"><br><br>
<input id="price" placeholder="Preço"><br><br>
<button onclick="add()">Adicionar Produto</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];

/* CARREGAR */
onSnapshot(collection(db,"products"), snap=>{
products = [];
snap.forEach(d=>{
products.push(d.data());
});
render();
});

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach(p=>{
list.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
</div>`;
});
}

/* ADD */
window.add = async function(){

await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value)
});

name.value="";
price.value="";
}

</script>

</body>
</html>
