<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Simples</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
}

.grid{
display:grid;
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card-body{padding:10px}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

#cart{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>🛍️ Loja Simples</header>

<div class="grid" id="list"></div>

<div id="cart" onclick="showCart()">🛒</div>

<script>

let products = [
{name:"Perfume A", price:50},
{name:"Perfume B", price:80},
{name:"Produto C", price:120}
];

let cart = [];

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach((p,i)=>{
list.innerHTML += `
<div class="card">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="add(${i})">Comprar</button>
</div>
</div>`;
});
}

render();

/* ADD CART */
function add(i){
cart.push(products[i]);
alert("Adicionado ao carrinho");
}

/* CART */
function showCart(){

if(cart.length === 0){
alert("Carrinho vazio");
return;
}

let msg = "🛒 Pedido:\n";
let total = 0;

cart.forEach(p=>{
msg += `- ${p.name} R$ ${p.price}\n`;
total += p.price;
});

msg += "\nTOTAL: R$ " + total;

window.open("https://wa.me/5585982241638?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
