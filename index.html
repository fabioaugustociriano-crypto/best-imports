<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
color:#000;
}

header{
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
position:relative;
}

/* ENGRENAGEM ADMIN */
#gear{
position:absolute;
right:15px;
top:15px;
font-size:20px;
cursor:pointer;
}

/* CATEGORIAS */
.cat{
display:flex;
gap:8px;
margin:10px;
}

.cat button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#fff;
font-weight:bold;
cursor:pointer;
}

.cat button.active{
background:#ff6a00;
color:#fff;
}

/* PRODUTOS */
.card{
background:#fff;
margin:10px;
border-radius:15px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#ff6a00;
font-weight:bold;
font-size:18px;
}

/* BOTÃO */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff;
font-weight:bold;
margin-top:8px;
cursor:pointer;
}

/* CARRINHO */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6a00;
color:#fff;
padding:15px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

/* MODAL CARRINHO */
#cartModal{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#fff;
border-top-left-radius:20px;
border-top-right-radius:20px;
box-shadow:0 -5px 20px rgba(0,0,0,0.2);
transition:0.3s;
padding:15px;
overflow:auto;
}

#cartModal.active{bottom:0}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

/* ADMIN */
#adminModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.adminBox{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
}
</style>
</head>

<body>

<header>
🛍️ Minha Loja

<div id="gear" onclick="openAdmin()">⚙️</div>
</header>

<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfumes')">Perfumes</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<div id="list"></div>

<div id="cartBtn" onclick="openCart()">🛒 Carrinho</div>

<!-- CARRINHO -->
<div id="cartModal">
<h3>Seu Carrinho</h3>
<div id="cart"></div>
<button onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
<button onclick="closeCart()">Fechar</button>
</div>

<!-- ADMIN -->
<div id="adminModal">
<div class="adminBox">
<h3>Senha Admin</h3>
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="closeAdmin()">Fechar</button>
</div>
</div>

<script>

const WHATSAPP = "5585982241638";
const ADMIN_PASS = "1234";

let filterCat="all";
let cart=[];

/* PRODUTOS */
let products=[
"Tirzec 15 mg ampola unica",
"Tirzec 15 mg 4 ampolas",
"Lipoless MD ampola unica",
"Lipoless 15 mg 4 ampolas",
"Retatrutide verde",
"Veltrane 90 mg",
"Veltrane 120mg",
"Sabah","Wazeer","Ameer","Leonie",
"Odyssey mandarin","Asad preto","Yara Candy",
"Assd elixir","Hawas Black","Yara elixir",
"Yara tous","Yara moi","Eclaire banoffi",
"Silver agent","Silver agent intense"
].map((p,i)=>({
id:i,
name:p,
price:0,
img:"https://via.placeholder.com/400x300",
category:(p.includes("Tirzec")||p.includes("Lipoless")||p.includes("Veltrane")||p.includes("Retatrutide"))?"Monjauro":"Perfumes"
}));

/* FILTRO */
function filter(c){
filterCat=c;

document.querySelectorAll(".cat button").forEach(b=>{
b.classList.remove("active");
if(b.innerText===c || (c==="all" && b.innerText==="Todos")){
b.classList.add("active");
}
});

render();
}

/* RENDER */
function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
if(filterCat!=="all" && p.category!==filterCat) return;

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<div class="price">R$ ${p.price}</div>

<button onclick="addCart(${i})">Adicionar</button>
<button onclick="editProduct(${i})">Editar</button>
<button onclick="removeProduct(${i})">Remover</button>
</div>
</div>
`;
});
}

/* CARRINHO COM QUANTIDADE */
function addCart(i){
let item=products[i];

let found=cart.find(p=>p.id===item.id);

if(found){
found.qty++;
}else{
cart.push({...item,qty:1});
}

renderCart();
}

function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";

cart.forEach((p,i)=>{
c.innerHTML+=`
<div class="cartItem">
<div>
${p.name}<br>
<small>Qtd: ${p.qty}</small>
</div>

<div>
<b>R$ ${p.price * p.qty}</b><br>
<button onclick="p.qty++;renderCart()">+</button>
<button onclick="p.qty>1 ? p.qty-- : cart.splice(${i},1);renderCart()">-</button>
</div>
</div>`;
});
}

/* WHATSAPP */
function sendWhatsApp(){
let msg="🛒 Pedido:%0A";

cart.forEach(p=>{
msg+=`- ${p.name} x${p.qty} = R$ ${p.price*p.qty}%0A`;
});

window.open("https://wa.me/"+WHATSAPP+"?text="+msg);
}

/* ADMIN */
function openAdmin(){
document.getElementById("adminModal").style.display="flex";
}

function closeAdmin(){
document.getElementById("adminModal").style.display="none";
}

function login(){
if(pass.value===ADMIN_PASS){
alert("Admin liberado");
closeAdmin();
}else{
alert("Senha incorreta");
}
}

/* EDITAR PRODUTO */
function editProduct(i){
let p=products[i];

let n=prompt("Nome:",p.name);
let pr=prompt("Preço:",p.price);
let img=prompt("Imagem URL:",p.img);

if(n) p.name=n;
if(pr) p.price=pr;
if(img) p.img=img;

render();
}

/* REMOVER */
function removeProduct(i){
products.splice(i,1);
render();
}

render();

</script>

</body>
</html>
