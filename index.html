<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBmbDy3WAMmIGrbDJHrQiC3-QX_ASzLUbI",
  authDomain: "best-imports-b25a5.firebaseapp.com",
  databaseURL: "https://best-imports-b25a5-default-rtdb.firebaseio.com",
  projectId: "best-imports-b25a5",
  storageBucket: "best-imports-b25a5.appspot.com",
  messagingSenderId: "1005080108441",
  appId: "1:1005080108441:web:4d19fcf902add5b7a30708"
};

/* INIT */
const app = initializeApp(firebaseConfig);

/* SERVICES */
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

/* EXPOR GLOBAL (para seu site antigo funcionar sem mudar tudo) */
window.db = db;
window.auth = auth;
window.storage = storage;

window.firestore = {
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  doc
};

window.storageRef = ref;
window.uploadBytes = uploadBytes;
window.getDownloadURL = getDownloadURL;

/* =========================
   🔥 BASE SHOPEE READY
========================= */

/* PRODUTOS */
window.products = [];
firestore.onSnapshot(firestore.collection(db,"products"), snap=>{
  products = [];
  snap.forEach(d=>products.push({id:d.id,...d.data()}));
  console.log("PRODUTOS:", products);
});

/* PEDIDOS (DASHBOARD) */
window.orders = [];
firestore.onSnapshot(firestore.collection(db,"orders"), snap=>{
  orders = [];
  snap.forEach(d=>orders.push({id:d.id,...d.data()}));
  console.log("ORDERS:", orders);
});

/* ADD PRODUTO */
window.addProduct = async function(p){
  await firestore.addDoc(firestore.collection(db,"products"),p);
};

/* UPDATE PRODUTO */
window.updateProduct = async function(id,data){
  await firestore.updateDoc(firestore.doc(db,"products",id),data);
};

/* DELETE */
window.deleteProduct = async function(id){
  await firestore.deleteDoc(firestore.doc(db,"products",id));
};

</script>
