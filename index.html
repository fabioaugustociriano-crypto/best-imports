<body>

<header>
<h2>LOJA SIMPLES</h2>
</header>

<div class="container" id="produtos"></div>

<!-- BOTÃO ADMIN -->
<button class="admin-btn" onclick="login()">⚙️</button>

<!-- PAINEL ADMIN -->
<div class="admin" id="admin">

<h3>🔐 Admin</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input id="imagem" placeholder="URL imagem"><br><br>

<button onclick="addProduto()">Adicionar</button>

<hr>

<h4>Produtos</h4>
<div id="listaAdmin"></div>

</div>

<script>

let produtos = [
  {nome:"Perfume X", preco:120, imagem:"https://i.imgur.com/1.jpg"},
  {nome:"Monjauro 15mg", preco:200, imagem:"https://i.imgur.com/2.jpg"}
];

// 🛍️ mostrar produtos
function carregar(){

  let div = document.getElementById("produtos");
  div.innerHTML = "";

  produtos.forEach((p,i)=>{
    div.innerHTML += `
    <div class="card">
      <img src="${p.imagem}">
      <h3>${p.nome}</h3>
      <div class="price">R$ ${p.preco}</div>

      <a class="btn"
      href="https://wa.me/5585982241638?text=Quero ${p.nome}">
      Comprar
      </a>
    </div>
    `;
  });

}

carregar();

// 🔐 login admin
function login(){

  let senha = prompt("Senha:");

  if(senha === "1234"){
    document.getElementById("admin").style.display = "block";
    carregarAdmin();
  } else {
    alert("Senha errada");
  }

}

// ➕ adicionar produto
function addProduto(){

  produtos.push({
    nome:nome.value,
    preco:preco.value,
    imagem:imagem.value
  });

  carregar();
  carregarAdmin();
}

// 📦 lista admin
function carregarAdmin(){

  let div = document.getElementById("listaAdmin");
  div.innerHTML = "";

  produtos.forEach((p,i)=>{
    div.innerHTML += `
    <div style="border:1px solid #ddd;padding:8px;margin-bottom:10px">
      <b>${p.nome}</b><br>
      R$ ${p.preco}<br>

      <button onclick="editar(${i})">Editar</button>
      <button onclick="remover(${i})">Excluir</button>
    </div>
    `;
  });

}

// ✏️ editar produto
function editar(i){

  let n = prompt("Nome:", produtos[i].nome);
  let p = prompt("Preço:", produtos[i].preco);
  let img = prompt("Imagem URL:", produtos[i].imagem);

  produtos[i] = {
    nome:n,
    preco:p,
    imagem:img
  };

  carregar();
  carregarAdmin();
}

// ❌ remover
function remover(i){
  produtos.splice(i,1);
  carregar();
  carregarAdmin();
}

</script>
