<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Best Imports</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#111827;color:#fff;padding:15px;text-align:center}

.cat{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.cat button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#fff;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:10px}

button{
width:100%;
padding:10px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
}

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>🛍️ Best Imports</header>

<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Monjauro')">Monjauro</button>
<button onclick="filter('Perfume')">Perfume</button>
</div>

<div class="grid" id="list"></div>

<div id="cartBtn" onclick="sendWhatsApp()">🛒</div>

<script>

/* FIREBASE */
  const firebaseConfig = {
    apiKey: "AIzaSyBmbDy3WAMmIGrbDJHrQiC3-QX_ASzLUbI",
    authDomain: "best-imports-b25a5.firebaseapp.com",
    databaseURL: "https://best-imports-b25a5-default-rtdb.firebaseio.com",
    projectId: "best-imports-b25a5",
    storageBucket: "best-imports-b25a5.firebasestorage.app",
    messagingSenderId: "1005080108441",
    appId: "1:1005080108441:web:85184a829b26c4bda30708",
    measurementId: "G-JNJ49FPNEH"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* DADOS */
let products = [];
let filterCat = "all";
let cart = [];
const WHATSAPP = "5585982241638";

/* CARREGAR DO BANCO */
function load(){
db.collection("products").onSnapshot(snap=>{
products = [];

snap.forEach(doc=>{
products.push({id:doc.id,...doc.data()});
});

render();
});
}

/* FILTRO */
function filter(c){
filterCat = c;
render();
}

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach(p=>{

if(filterCat !== "all" && p.category !== filterCat) return;

list.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Comprar</button>
</div>
</div>
`;
});
}

/* CARRINHO SIMPLES */
function add(p){
let found = cart.find(x=>x.id===p.id);

if(found) found.qty++;
else cart.push({...p,qty:1});
}

/* WHATSAPP */
function sendWhatsApp(){
let msg="🛒 Pedido:%0A";
let total=0;

cart.forEach(p=>{
let t=p.price*p.qty;
total+=t;
msg+=`- ${p.name} x${p.qty} = R$ ${t}%0A`;
});

msg+=`%0A💰 TOTAL: R$ ${total}`;

window.open("https://wa.me/"+WHATSAPP+"?text="+encodeURIComponent(msg));
}

load();

</script>

</body>
</html>
