<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Best Imports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#000; color:#fff; padding:15px; text-align:center; }
.container { padding:20px; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.card { background:#fff; padding:10px; border-radius:10px; text-align:center; }
.card img { width:100%; border-radius:10px; }
button { background:#000; color:#fff; border:none; padding:10px; margin-top:10px; cursor:pointer; border-radius:5px; }
#cart { position:fixed; right:10px; top:10px; background:#fff; padding:10px; border-radius:10px; cursor:pointer; }
#admin { display:none; background:#fff; padding:15px; margin-top:20px; border-radius:10px; }
input, select { padding:8px; margin:5px 0; width:100%; }
</style>
</head>
<body>

<header>
<h1>Best Imports</h1>
<button onclick="login()">Admin</button>
<button onclick="logout()">Sair</button>
</header>

<div id="cart" onclick="openCart()">
🛒 <span id="cartCount">0</span>
<button onclick="sendWhats()">Finalizar</button>
</div>

<div class="container">

<select id="categoryFilter" onchange="renderProducts()">
<option value="all">Todos</option>
<option value="monjauro">Monjauro</option>
<option value="perfume">Perfume</option>
</select>

<div class="products" id="productList"></div>

<div id="admin">
<h2>Painel Admin</h2>
<input type="text" id="newName" placeholder="Nome do produto">
<input type="number" id="newPrice" placeholder="Preço">
<input type="file" id="newImage">
<select id="newCategory">
<option value="monjauro">Monjauro</option>
<option value="perfume">Perfume</option>
</select>
<button onclick="addProduct()">Adicionar Produto</button>
</div>

</div>

<!-- CARRINHO VISUAL -->
<div id="cartModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999;">
<div style="background:#fff; width:90%; max-width:400px; margin:50px auto; padding:20px; border-radius:15px;">
<h2>Seu Carrinho</h2>
<div id="cartItems"></div>
<h3 id="cartTotal">Total: R$ 0</h3>
<button onclick="sendWhats()">Finalizar</button>
<button onclick="closeCart()">Fechar</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBmbDy3WAMmIGrbDJHrQiC3-QX_ASzLUbI",
authDomain: "best-imports-b25a5.firebaseapp.com",
databaseURL: "https://best-imports-b25a5-default-rtdb.firebaseio.com",
projectId: "best-imports-b25a5",
storageBucket: "best-imports-b25a5.firebasestorage.app",
messagingSenderId: "1005080108441",
appId: "1:1005080108441:web:4d19fcf902add5b7a30708",
measurementId: "G-KMRB6NS837"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let products = [];
let cart = [];
let logged = false;

db.ref("products").on("value", snapshot => {
products = [];
snapshot.forEach(item => {
products.push({ id: item.key, ...item.val() });
});
renderProducts();
});

function renderProducts() {
const list = document.getElementById("productList");
const filter = document.getElementById("categoryFilter").value;

list.innerHTML = "";

products
.filter(p => filter === "all" || p.category === filter)
.forEach((p, index) => {
list.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="addToCart(${index})">Comprar</button>
${logged ? `
<button onclick="editProduct(${index})">Editar</button>
<button onclick="deleteProduct(${index})">Excluir</button>
` : ""}
</div>
`;
});
}

function addToCart(index) {
const item = cart.find(p => p.id === products[index].id);
if (item) item.qty += 1;
else cart.push({...products[index], qty:1});
updateCart();
}

function updateCart() {
document.getElementById("cartCount").innerText = cart.reduce((a,b)=>a+b.qty,0);
}

function openCart() {
const modal = document.getElementById("cartModal");
const itemsDiv = document.getElementById("cartItems");

modal.style.display = "block";
itemsDiv.innerHTML = "";

let total = 0;

cart.forEach((p, i) => {
total += p.price * p.qty;

itemsDiv.innerHTML += `
<div style="border-bottom:1px solid #ddd; padding:10px 0;">
<b>${p.name}</b><br>
R$ ${p.price} x ${p.qty}
<br>
<button onclick="changeQty(${i}, -1)">-</button>
<button onclick="changeQty(${i}, 1)">+</button>
<button onclick="removeItem(${i})">Remover</button>
</div>
`;
});

document.getElementById("cartTotal").innerText = "Total: R$ " + total;
}

function closeCart() {
document.getElementById("cartModal").style.display = "none";
}

function changeQty(index, change) {
cart[index].qty += change;
if (cart[index].qty <= 0) cart.splice(index, 1);
updateCart();
openCart();
}

function removeItem(index) {
cart.splice(index, 1);
updateCart();
openCart();
}

function addProduct() {
if (!logged) return alert("Faça login");

const name = document.getElementById("newName").value;
const price = document.getElementById("newPrice").value;
const file = document.getElementById("newImage").files[0];
const category = document.getElementById("newCategory").value;

const reader = new FileReader();
reader.onload = function(e) {
db.ref("products").push({ name, price, category, image: e.target.result });
};

if (file) reader.readAsDataURL(file);
}

function editProduct(index) {
if (!logged) return alert("Faça login");

const p = products[index];

const newName = prompt("Novo nome:", p.name);
const newPrice = prompt("Novo preço:", p.price);
const newCategory = prompt("Categoria:", p.category);

if (newName) p.name = newName;
if (newPrice) p.price = newPrice;
if (newCategory) p.category = newCategory;

db.ref("products/" + p.id).update(p);
}

function deleteProduct(index) {
if (!logged) return alert("Faça login");

if (confirm("Excluir produto?")) {
db.ref("products/" + products[index].id).remove();
}
}

function login() {
const user = prompt("Usuário:");
const pass = prompt("Senha:");

if (user === "admin" && pass === "1234") {
logged = true;
document.getElementById("admin").style.display = "block";
renderProducts();
} else {
alert("Senha incorreta");
}
}

function logout() {
logged = false;
document.getElementById("admin").style.display = "none";
renderProducts();
}

function sendWhats() {
let msg = "Pedido:%0A";
let total = 0;

cart.forEach(p => {
msg += `- ${p.name} x${p.qty} R$${p.price}%0A`;
total += p.price * p.qty;
});

msg += `%0ATotal: R$${total}`;

window.open(`https://wa.me/5585982241638?text=${msg}`);
}
</script>

</body>
</html>
