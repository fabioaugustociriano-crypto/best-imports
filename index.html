<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
position:relative;
}

#gear{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
}

.grid{display:grid;gap:10px;padding:10px}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:10px}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.cat{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.cat button{
background:#fff;
color:#000;
border-radius:20px;
padding:8px 12px;
}

/* CART */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50%;
cursor:pointer;
}

/* ADMIN */
#admin{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.adminBox{
background:#fff;
padding:15px;
width:90%;
max-width:600px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
🛍️ Loja Pro
<div id="gear" onclick="openAdmin()">⚙️</div>
</header>

<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfume')">Perfume</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<div class="grid" id="list"></div>

<div id="cartBtn" onclick="checkout()">🛒 Finalizar</div>

<!-- ADMIN -->
<div id="admin">
<div class="adminBox">

<h3>Admin</h3>

<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<input id="name" placeholder="Nome">
<input id="price" placeholder="Preço">

<input type="file" id="fileInput" accept="image/*,application/pdf">

<select id="cat">
<option>Perfume</option>
<option>Monjauro</option>
</select>

<button onclick="addProduct()">Adicionar</button>

</div>

<button onclick="closeAdmin()">Fechar</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU_PROJECT",
  storageBucket: "SEU_PROJECT.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* VARS */
let products = [];
let cart = [];
let filterCat = "all";

/* LOAD PRODUCTS */
onSnapshot(collection(db,"products"), snap=>{
products = [];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
render();
});

/* FILTER */
window.filter = function(f){
filterCat = f;
render();
}

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach(p=>{
if(filterCat!="all" && p.category!=filterCat) return;

list.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="addCart('${p.id}')">Comprar</button>
</div>
</div>`;
});
}

/* CART */
window.addCart = function(id){
let p = products.find(x=>x.id===id);

let f = cart.find(x=>x.id===id);
if(f) f.qty++;
else cart.push({...p,qty:1});
}

/* WHATSAPP CHECKOUT (CORRIGIDO) */
window.checkout = function(){

if(cart.length === 0){
alert("Carrinho vazio");
return;
}

let msg = "🛒 *Novo Pedido*\n\n";
let total = 0;

cart.forEach(p=>{
let subtotal = p.price * p.qty;
total += subtotal;

msg += `- ${p.name} x${p.qty} = R$ ${subtotal}\n`;
});

msg += `\n💰 *TOTAL: R$ ${total}*`;

let phone = "5585982241638";

window.open(
  "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg),
  "_blank"
);

cart = [];
}

/* ADMIN */
window.openAdmin = ()=>admin.style.display="flex";
window.closeAdmin = ()=>admin.style.display="none";

window.login = function(){
if(pass.value=="1234"){
panel.style.display="block";
}
}

/* ADD PRODUCT + UPLOAD */
window.addProduct = async function(){

let file = document.getElementById("fileInput").files[0];
let url = "";

if(file){
const storageRef = ref(storage, "produtos/"+file.name);
await uploadBytes(storageRef,file);
url = await getDownloadURL(storageRef);
}

await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value),
img:url || "https://via.placeholder.com/400",
category:cat.value
});

alert("Produto adicionado!");
}

</script>

</body>
</html>
