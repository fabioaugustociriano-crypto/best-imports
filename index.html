<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Simples</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
}

.grid{
display:grid;
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card-body{padding:10px}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50%;
cursor:pointer;
}

#modal{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#fff;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.3s;
padding:10px;
overflow:auto;
}

#modal.active{bottom:0}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>🛍️ Loja Simples</header>

<div class="grid" id="list"></div>

<div id="cartBtn" onclick="openCart()">🛒</div>

<div id="modal">
<h3>Carrinho</h3>
<div id="cart"></div>
<button onclick="checkout()">Finalizar no WhatsApp</button>
<button onclick="closeCart()">Fechar</button>
</div>

<script>

let products = [
{name:"Perfume A", price:50},
{name:"Perfume B", price:80},
{name:"Produto C", price:120}
];

let cart = [];

/* RENDER PRODUTOS */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach((p,i)=>{
list.innerHTML += `
<div class="card">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="add(${i})">Adicionar</button>
</div>
</div>`;
});
}

render();

/* ADD CARRINHO */
function add(i){

let item = products[i];

let found = cart.find(p=>p.name===item.name);

if(found){
found.qty++;
}else{
cart.push({...item, qty:1});
}

renderCart();
}

/* RENDER CARRINHO */
function renderCart(){
let c = document.getElementById("cart");
c.innerHTML = "";

let total = 0;

cart.forEach((p,i)=>{
let subtotal = p.price * p.qty;
total += subtotal;

c.innerHTML += `
<div class="item">
<div>
<b>${p.name}</b><br>
R$ ${p.price}
</div>

<div>
<button onclick="changeQty(${i},1)">+</button>
${p.qty}
<button onclick="changeQty(${i},-1)">-</button>
</div>
</div>`;
});

c.innerHTML += `<h3>Total: R$ ${total}</h3>`;
}

/* MUDAR QTD */
function changeQty(i,val){

cart[i].qty += val;

if(cart[i].qty <= 0){
cart.splice(i,1);
}

renderCart();
}

/* CART */
function openCart(){
document.getElementById("modal").classList.add("active");
renderCart();
}

function closeCart(){
document.getElementById("modal").classList.remove("active");
}

/* WHATSAPP */
function checkout(){

if(cart.length===0){
alert("Carrinho vazio");
return;
}

let msg = "🛒 Pedido:\n";
let total = 0;

cart.forEach(p=>{
let t = p.price * p.qty;
total += t;
msg += `- ${p.name} x${p.qty} = R$ ${t}\n`;
});

msg += `\nTOTAL: R$ ${total}`;

window.open("https://wa.me/5585982241638?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
