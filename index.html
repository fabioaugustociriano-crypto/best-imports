<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Pro Completa</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

.grid{display:grid;gap:10px;padding:10px}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover}

.card-body{padding:10px}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

#admin{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>🛍️ Loja Pro Completa</header>

<div class="grid" id="list"></div>

<div id="admin">

<h3>Admin Upload</h3>

<input id="name" placeholder="Nome"><br><br>
<input id="price" placeholder="Preço"><br><br>
<input type="file" id="file"><br><br>

<button onclick="addProduct()">Adicionar Produto</button>

</div>

<button onclick="checkout()">Finalizar WhatsApp</button>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU_PROJECT",
  storageBucket: "SEU_PROJECT.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* VARIÁVEIS */
let products = [];
let cart = [];

/* CARREGAR PRODUTOS */
onSnapshot(collection(db,"products"), snap=>{
products = [];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
render();
});

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach(p=>{
list.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Comprar</button>
</div>
</div>`;
});
}

/* CARRINHO */
window.add = function(name,price){
cart.push({name,price});
}

/* WHATSAPP */
window.checkout = function(){

if(cart.length===0){
alert("Carrinho vazio");
return;
}

let msg = "🛒 Pedido:\n";

cart.forEach(p=>{
msg += `- ${p.name} R$ ${p.price}\n`;
});

window.open("https://wa.me/5585982241638?text="+encodeURIComponent(msg));
}

/* UPLOAD + ADD PRODUTO */
window.addProduct = async function(){

let file = document.getElementById("file").files[0];
let url = "";

if(file){
const storageRef = ref(storage,"produtos/"+file.name);
await uploadBytes(storageRef,file);
url = await getDownloadURL(storageRef);
}

await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value),
img:url || "https://via.placeholder.com/400"
});

alert("Produto adicionado!");
}

</script>

</body>
</html>
