<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Pro | Premium Store</title>

    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }

        /* HEADER PROFISSIONAL */
        header {
            background: var(--dark);
            color: #fff;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }

        /* BUSCA E FILTROS */
        .search-container {
            padding: 15px;
            background: #fff;
        }

        input[type="text"], input[type="number"], input[type="password"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            margin-bottom: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .cat {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat::-webkit-scrollbar { display: none; }

        .cat button {
            white-space: nowrap;
            padding: 8px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            background: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* GRID DE PRODUTOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #eee;
        }

        .card-body {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-body h3 { font-size: 14px; margin-bottom: 8px; color: var(--dark); height: 40px; overflow: hidden; }

        .price { color: var(--primary); font-weight: 800; font-size: 18px; margin-bottom: 10px; }

        /* BOTÕES */
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-edit {
            background: #f1f5f9;
            color: #64748b;
            font-size: 11px;
            margin-top: 5px;
            padding: 5px;
            border-radius: 5px;
            border: none;
        }

        /* CARRINHO FLUTUANTE */
        #cartBtn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 99;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .badge { background: #ef4444; padding: 2px 8px; border-radius: 10px; font-size: 12px; }

        /* MODAL ANIMADO */
        #cartModal {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 400px; height: 100%;
            background: #fff; z-index: 200;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        #cartModal.active { right: 0; }

        .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        #cart-items { flex-grow: 1; overflow-y: auto; padding: 20px; }

        .cart-footer { padding: 20px; background: #f8fafc; border-top: 1px solid #eee; }

        .cartItem {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #f1f5f9;
        }

        /* ADMIN */
        #admin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 300;
            display: none; align-items: center; justify-content: center;
        }

        .adminBox { background: #fff; padding: 25px; width: 90%; max-width: 500px; border-radius: 15px; }

    </style>
</head>
<body>

<header>
    <div></div>
    <div class="logo">LUXURY STORE</div>
    <div onclick="openAdmin()" style="cursor:pointer">⚙️</div>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Buscar produto..." onkeyup="render()">
</div>

<div class="cat" id="catList">
    <!-- Gerado via JS -->
</div>

<div class="grid" id="list"></div>

<div id="cartBtn" onclick="openCart()">
    🛒 Carrinho <span class="badge" id="cartCount">0</span>
</div>

<!-- MODAL CARRINHO -->
<div id="cartModal">
    <div class="modal-header">
        <h3>Sacola de Compras</h3>
        <button onclick="closeCart()" style="background:none; border:none; font-size:24px;">×</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-footer">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; font-size:18px;">
            <span>Total:</span>
            <span id="cartTotal">R$ 0,00</span>
        </div>
        <button class="btn-add" style="background:#22c55e; margin-bottom:10px;" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
        <button class="btn-add" style="background:#f1f5f9; color:#64748b;" onclick="closeCart()">Continuar Comprando</button>
    </div>
</div>

<!-- ADMIN -->
<div id="admin">
    <div class="adminBox">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Painel de Controle</h2>
            <button onclick="closeAdmin()">✕</button>
        </div>
        
        <input id="name" placeholder="Nome do Produto">
        <input id="price" type="number" placeholder="Preço (Ex: 150.00)">
        <input id="img" placeholder="URL da Imagem">
        <select id="catSelect">
            <option value="Perfumes">Perfumes</option>
            <option value="Monjauro">Monjauro</option>
        </select>
        <button class="btn-add" onclick="addProduct()">Salvar Produto</button>
        <p style="text-align:center; margin-top:20px; font-size:12px; color:gray;">Senha mestre: 1234</p>
    </div>
</div>

<script>
    const WHATSAPP = "5585982241638";
    const ADMIN_PASS = "1234";

    // Iniciar com dados do LocalStorage ou padrão
    let products = JSON.parse(localStorage.getItem('loja_products')) || [
        {id: 1, name: "Tirzec 15 mg ampola unica", price: 450, category: "Monjauro", img: "https://via.placeholder.com/400x300"},
        {id: 2, name: "Sabah Perfume", price: 280, category: "Perfumes", img: "https://via.placeholder.com/400x300"}
    ];

    let cart = [];
    let filterCat = "all";

    // Salvar no Navegador
    function saveData() {
        localStorage.setItem('loja_products', JSON.stringify(products));
    }

    function render() {
        const list = document.getElementById("list");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        list.innerHTML = "";

        const filtered = products.filter(p => {
            const matchesCat = filterCat === "all" || p.category === filterCat;
            const matchesSearch = p.name.toLowerCase().includes(searchTerm);
            return matchesCat && matchesSearch;
        });

        filtered.forEach((p) => {
            list.innerHTML += `
                <div class="card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x300?text=Sem+Imagem'">
                    <div class="card-body">
                        <div>
                            <h3>${p.name}</h3>
                            <div class="price">R$ ${p.price.toFixed(2)}</div>
                        </div>
                        <div>
                            <button class="btn-add" onclick="addCart(${p.id})">Adicionar</button>
                            <button class="btn-edit" onclick="editProduct(${p.id})">Editar</button>
                        </div>
                    </div>
                </div>`;
        });

        renderCategories();
    }

    function renderCategories() {
        const catDiv = document.getElementById("catList");
        const categories = ["all", ...new Set(products.map(p => p.category))];
        catDiv.innerHTML = categories.map(c => `
            <button class="${filterCat === c ? 'active' : ''}" onclick="setFilter('${c}')">
                ${c === 'all' ? 'Todos' : c}
            </button>
        `).join('');
    }

    function setFilter(c) {
        filterCat = c;
        render();
    }

    // CARRINHO LOGICA
    function addCart(id) {
        const product = products.find(p => p.id === id);
        const inCart = cart.find(item => item.id === id);

        if (inCart) {
            inCart.qty++;
        } else {
            cart.push({...product, qty: 1});
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById("cart-items");
        const count = document.getElementById("cartCount");
        const totalEl = document.getElementById("cartTotal");
        
        container.innerHTML = "";
        let total = 0;
        let itemsCount = 0;

        cart.forEach((item, index) => {
            total += item.price * item.qty;
            itemsCount += item.qty;
            container.innerHTML += `
                <div class="cartItem">
                    <img src="${item.img}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">
                    <div style="flex-grow:1">
                        <div style="font-size:14px; font-weight:bold">${item.name}</div>
                        <div style="color:var(--primary)">R$ ${item.price.toFixed(2)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="updateQty(${index}, -1)" style="padding:2px 8px">-</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty(${index}, 1)" style="padding:2px 8px">+</button>
                    </div>
                </div>`;
        });

        count.innerText = itemsCount;
        totalEl.innerText = `R$ ${total.toFixed(2)}`;
    }

    function updateQty(index, change) {
        cart[index].qty += change;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        updateCartUI();
    }

    function openCart() { document.getElementById("cartModal").classList.add("active"); }
    function closeCart() { document.getElementById("cartModal").classList.remove("active"); }

    function sendWhatsApp() {
        if (cart.length === 0) return alert("Carrinho vazio!");
        let msg = "🚀 *Novo Pedido - Loja Pro*%0A%0A";
        let total = 0;

        cart.forEach(p => {
            msg += `• *${p.name}* (x${p.qty}) - R$ ${(p.price * p.qty).toFixed(2)}%0A`;
            total += p.price * p.qty;
        });

        msg += `%0A💰 *TOTAL: R$ ${total.toFixed(2)}*`;
        window.open(`https://wa.me/${WHATSAPP}?text=${msg}`);
    }

    // ADMIN LOGICA
    function openAdmin() {
        const p = prompt("Senha admin:");
        if(p === ADMIN_PASS) document.getElementById("admin").style.display = "flex";
        else alert("Acesso negado");
    }

    function closeAdmin() { document.getElementById("admin").style.display = "none"; }

    function addProduct() {
        const name = document.getElementById("name").value;
        const price = document.getElementById("price").value;
        const img = document.getElementById("img").value;
        const cat = document.getElementById("catSelect").value;

        if(!name || !price) return alert("Preencha nome e preço");

        products.push({
            id: Date.now(),
            name,
            price: parseFloat(price),
            img: img || "https://via.placeholder.com/400x300",
            category: cat
        });

        saveData();
        render();
        closeAdmin();
    }

    function editProduct(id) {
        const p = products.find(x => x.id === id);
        const pass = prompt("Senha admin para editar:");
        if(pass !== ADMIN_PASS) return alert("Senha incorreta");

        const newName = prompt("Nome:", p.name);
        const newPrice = prompt("Preço:", p.price);
        
        if(newName) p.name = newName;
        if(newPrice) p.price = parseFloat(newPrice);
        
        saveData();
        render();
    }

    // Inicialização
    render();
</script>

</body>
</html>
