<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja</title>

<style>
*{font-family:Arial;margin:0;box-sizing:border-box}
body{background:#f4f6f9}

header{
background:#111827;
color:#fff;
padding:18px;
text-align:center;
font-weight:bold;
}

.cat{display:flex;gap:10px;padding:10px;overflow:auto}
.cat button{
padding:10px;
border:none;
border-radius:20px;
background:#fff;
font-weight:bold;
}

.card{
background:#fff;
margin:10px;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:10px}

button{
width:100%;
padding:10px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🛍️ Minha Loja</header>

<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfumes')">Perfumes</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<div id="list"></div>

<div id="cartBtn" onclick="openCart()">🛒 Carrinho</div>

<script>

const WHATSAPP="5585982241638";

let cart=[];
let filterCat="all";

let products=JSON.parse(localStorage.getItem("products")) || [];

function filter(c){
filterCat=c;
render();
}

function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
if(filterCat!="all" && p.category!=filterCat) return;

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="addCart(${i})">Comprar</button>
</div>
</div>`;
});
}

function addCart(i){
let item=products[i];

let found=cart.find(p=>p.id==item.id);

if(found) found.qty++;
else cart.push({...item,qty:1});

alert("Adicionado ao carrinho");
}

function openCart(){
let msg="🛒 Pedido:%0A";
let total=0;

cart.forEach(p=>{
let t=p.price*p.qty;
total+=t;
msg+=`- ${p.name} x${p.qty} = R$ ${t}%0A`;
});

msg+=`%0ATotal: R$ ${total}`;

window.open("https://wa.me/"+WHATSAPP+"?text="+encodeURIComponent(msg));
}

render();

</script>

</body>
</html>
