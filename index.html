<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER SHOPEE STYLE */
header{
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */
.container{padding:12px}

/* CATEGORIAS */
.cat{
display:flex;
gap:8px;
margin:10px 0;
}

.cat button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#fff;
font-weight:bold;
}

.cat button.active{
background:#ff6a00;
color:#fff;
}

/* PRODUTOS */
.card{
background:#fff;
border-radius:15px;
margin:10px 0;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card-body{padding:10px}

.price{
color:#ff6a00;
font-weight:bold;
font-size:18px;
}

/* BOTÃO */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff;
font-weight:bold;
margin-top:8px;
cursor:pointer;
}

/* CARRINHO */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6a00;
color:#fff;
padding:15px;
border-radius:50px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
cursor:pointer;
}

/* MODAL CARRINHO */
#cartModal{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#fff;
border-top-left-radius:20px;
border-top-right-radius:20px;
box-shadow:0 -5px 20px rgba(0,0,0,0.2);
transition:0.3s;
padding:15px;
overflow:auto;
}

#cartModal.active{
bottom:0;
}

.cartItem{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>
🛍️ Minha Loja Online
</header>

<div class="container">

<!-- CATEGORIAS -->
<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfumes')">Perfumes</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<!-- PRODUTOS -->
<div id="list"></div>

</div>

<!-- CARRINHO -->
<div id="cartBtn" onclick="openCart()">🛒 Carrinho</div>

<div id="cartModal">
<h3>Seu Carrinho</h3>
<div id="cart"></div>

<button onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
<button onclick="closeCart()">Fechar</button>
</div>

<script>

const WHATSAPP = "5585982241638";

let cart=[];
let filterCat="all";

/* 📦 SEUS PRODUTOS */
let products=[
"Tirzec 15 mg ampola unica",
"Tirzec 15 mg 4 ampolas",
"Lipoless MD ampola unica",
"Lipoless 15 mg 4 ampolas",
"Retatrutide verde",
"Veltrane 90 mg",
"Veltrane 120mg",
"Sabah","Wazeer","Ameer","Leonie",
"Odyssey mandarin","Asad preto","Yara Candy",
"Assd elixir","Hawas Black","Yara elixir",
"Yara tous","Yara moi","Eclaire banoffi",
"Silver agent","Silver agent intense"
].map(p=>({
name:p,
price:0,
img:"https://via.placeholder.com/400x300",
category:(p.includes("Tirzec")||p.includes("Lipoless")||p.includes("Veltrane")||p.includes("Retatrutide"))?"Monjauro":"Perfumes"
}));

/* FILTRO */
function filter(c){
filterCat=c;

document.querySelectorAll(".cat button").forEach(b=>{
b.classList.remove("active");
if(c==="all" && b.innerText==="Todos") b.classList.add("active");
if(b.innerText===c) b.classList.add("active");
});

render();
}

/* RENDER */
function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
if(filterCat!=="all" && p.category!==filterCat) return;

list.innerHTML+=`
<div class="card">
<img src="${p.img}" width="100%">

<div class="card-body">
<h3>${p.name}</h3>
<div class="price">R$ ${p.price}</div>

<button onclick="addCart(${i})">Adicionar</button>
</div>
</div>
`;
});
}

/* CARRINHO */
function addCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";

cart.forEach((p,i)=>{
c.innerHTML+=`
<div class="cartItem">
${p.name}
<b>R$ ${p.price}</b>
</div>`;
});
}

/* MODAL */
function openCart(){
document.getElementById("cartModal").classList.add("active");
renderCart();
}

function closeCart(){
document.getElementById("cartModal").classList.remove("active");
}

/* WHATSAPP */
function sendWhatsApp(){
let msg="🛒 Pedido:%0A";

cart.forEach(p=>{
msg+=`- ${p.name} R$ ${p.price}%0A`;
});

window.open("https://wa.me/"+WHATSAPP+"?text="+msg);
}

render();

</script>

</body>
</html>
