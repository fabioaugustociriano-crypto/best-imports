<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Restaurada</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
position:relative;
}

#cartBtn{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
}

.grid{display:grid;gap:10px;padding:10px}

.card{
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* CART */
#cartModal{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#fff;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.3s;
padding:10px;
overflow:auto;
}

#cartModal.active{bottom:0}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

/* ADMIN */
#admin{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
🛍️ Loja Restaurada
<div id="cartBtn" onclick="openCart()">🛒</div>
</header>

<div class="grid" id="list"></div>

<!-- CART -->
<div id="cartModal">
<h3>Carrinho</h3>
<div id="cart"></div>
<button onclick="checkout()">Finalizar WhatsApp</button>
<button onclick="closeCart()">Fechar</button>
</div>

<!-- ADMIN -->
<div id="admin">
<h3>Admin - Adicionar Produto</h3>

<input id="name" placeholder="Nome"><br><br>
<input id="price" placeholder="Preço"><br><br>

<button onclick="addProduct()">Adicionar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* VARIÁVEIS */
let products = [];
let cart = [];

/* PRODUTOS */
onSnapshot(collection(db,"products"), snap=>{
products = [];
snap.forEach(d=>{
products.push({id:d.id,...d.data()});
});
render();
});

/* RENDER */
function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach((p,i)=>{
list.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="addCart(${i})">Comprar</button>
</div>`;
});
}

/* CARRINHO */
window.addCart = function(i){

let item = products[i];
let found = cart.find(p=>p.id===item.id);

if(found){
found.qty++;
}else{
cart.push({...item, qty:1});
}

renderCart();
}

function renderCart(){
let c = document.getElementById("cart");
c.innerHTML = "";

let total = 0;

cart.forEach((p,i)=>{
let sub = p.price * p.qty;
total += sub;

c.innerHTML += `
<div class="item">
<div>
<b>${p.name}</b><br>
R$ ${p.price}
</div>

<div>
<button onclick="changeQty(${i},1)">+</button>
${p.qty}
<button onclick="changeQty(${i},-1)">-</button>
</div>
</div>`;
});

c.innerHTML += `<h3>Total: R$ ${total}</h3>`;
}

window.changeQty = function(i,val){
cart[i].qty += val;
if(cart[i].qty <= 0) cart.splice(i,1);
renderCart();
}

/* MODAL CART */
window.openCart = function(){
document.getElementById("cartModal").classList.add("active");
renderCart();
}

window.closeCart = function(){
document.getElementById("cartModal").classList.remove("active");
}

/* WHATSAPP */
window.checkout = function(){

if(cart.length===0){
alert("Carrinho vazio");
return;
}

let msg = "🛒 Pedido:\n";
let total = 0;

cart.forEach(p=>{
let t = p.price * p.qty;
total += t;
msg += `- ${p.name} x${p.qty} = R$ ${t}\n`;
});

msg += `\nTOTAL: R$ ${total}`;

window.open("https://wa.me/5585982241638?text="+encodeURIComponent(msg));
}

/* ADMIN */
window.addProduct = async function(){

await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value)
});

name.value="";
price.value="";
}

</script>

</body>
</html>
