<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
*{
font-family:Arial;
color:#000 !important;
}

body{
margin:0;
background:#f5f5f5;
}

header{
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff !important;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
position:relative;
}

/* ADMIN ICON */
#gear{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
}

/* CATEGORIAS (MANTIDAS) */
.cat{
display:flex;
gap:8px;
padding:10px;
}

.cat button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#fff;
font-weight:bold;
}

.cat button.active{
background:#ff6a00;
color:#fff !important;
}

/* PRODUTOS */
.card{
background:#fff;
margin:10px;
border-radius:15px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#ff6a00 !important;
font-weight:bold;
font-size:18px;
}

/* BOTÃO COMPRAR */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff6a00,#ff8c00);
color:#fff !important;
font-weight:bold;
margin-top:5px;
cursor:pointer;
}

/* CARRINHO */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6a00;
color:#fff;
padding:15px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* MODAL CARRINHO */
#cartModal{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#fff;
border-top-left-radius:20px;
border-top-right-radius:20px;
transition:0.3s;
padding:15px;
overflow:auto;
}

#cartModal.active{
bottom:0;
}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

/* ADMIN */
#admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.adminBox{
background:#fff;
padding:20px;
width:90%;
border-radius:10px;
}
</style>
</head>

<body>

<header>
🛍️ Minha Loja
<div id="gear" onclick="openAdmin()">⚙️</div>
</header>

<!-- CATEGORIAS RESTAURADAS -->
<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfumes')">Perfumes</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<div id="list"></div>

<div id="cartBtn" onclick="openCart()">🛒</div>

<!-- CARRINHO -->
<div id="cartModal">
<h3>Carrinho</h3>
<div id="cart"></div>
<button onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
<button onclick="closeCart()">Fechar</button>
</div>

<!-- ADMIN -->
<div id="admin">
<div class="adminBox">
<h3>Admin</h3>

<input id="name" placeholder="Nome">
<input id="price" placeholder="Preço">

<input type="file" id="imgFile">
<input id="pdf" placeholder="PDF (link opcional)">

<select id="cat">
<option>Perfumes</option>
<option>Monjauro</option>
</select>

<button onclick="addProduct()">Adicionar</button>
<button onclick="closeAdmin()">Fechar</button>
</div>
</div>

<script>

const WHATSAPP = "5585982241638";

let cart=[];
let filterCat="all";

/* PRODUTOS */
let products = JSON.parse(localStorage.getItem("products")) || [
"Tirzec 15 mg ampola unica",
"Tirzec 15 mg 4 ampolas",
"Lipoless MD ampola unica",
"Lipoless 15 mg 4 ampolas",
"Retatrutide verde",
"Veltrane 90 mg",
"Veltrane 120mg",
"Sabah","Wazeer","Ameer","Leonie",
"Odyssey mandarin","Asad preto","Yara Candy",
"Assd elixir","Hawas Black","Yara elixir",
"Yara tous","Yara moi","Eclaire banoffi",
"Silver agent","Silver agent intense"
].map((p,i)=>({
id:i,
name:p,
price:0,
img:"https://via.placeholder.com/400x300",
pdf:"",
category:(p.includes("Tirzec")||p.includes("Lipoless")||p.includes("Veltrane")||p.includes("Retatrutide"))?"Monjauro":"Perfumes"
}));

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* FILTRO */
function filter(c){
filterCat=c;
render();
}

/* LISTA */
function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach((p,i)=>{
if(filterCat!="all" && p.category!=filterCat) return;

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<div class="price">R$ ${p.price}</div>

<button onclick="addCart(${i})">Comprar</button>

</div>
</div>`;
});
}

/* CARRINHO */
function addCart(i){
let item=products[i];

let found=cart.find(p=>p.id==item.id);

if(found){
found.qty++;
}else{
cart.push({...item,qty:1});
}

renderCart();
}

/* RENDER CARRINHO */
function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";

cart.forEach((p,i)=>{
c.innerHTML+=`
<div class="cartItem">
<div>
${p.name}<br>
Qtd: ${p.qty}
</div>

<div>
R$ ${p.price*p.qty}<br>

<button onclick="p.qty++;renderCart()">+</button>
<button onclick="p.qty>1?p.qty--:cart.splice(${i},1);renderCart()">-</button>
</div>
</div>`;
});
}

/* WHATSAPP */
function sendWhatsApp(){
let msg="🛒 Pedido:%0A";

cart.forEach(p=>{
msg+=`- ${p.name} x${p.qty} = R$ ${p.price*p.qty}%0A`;
});

window.open("https://wa.me/"+WHATSAPP+"?text="+msg);
}

/* ADMIN */
function openAdmin(){
admin.style.display="flex";
}

function closeAdmin(){
admin.style.display="none";
}

/* ADD PRODUTO */
function addProduct(){

let file=document.getElementById("imgFile").files[0];

if(file){
let reader=new FileReader();
reader.onload=function(){
saveProduct(reader.result);
}
reader.readAsDataURL(file);
}else{
saveProduct("https://via.placeholder.com/400x300");
}

}

function saveProduct(img){

products.push({
id:Date.now(),
name:name.value,
price:Number(price.value),
img:img,
pdf:pdf.value,
category:cat.value
});

save();
render();
closeAdmin();
}

/* ADMIN CLOSE */
function closeAdmin(){
admin.style.display="none";
}

render();

</script>

</body>
</html>
