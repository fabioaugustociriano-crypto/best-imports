<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Imports Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#7c3aed;color:#fff;text-align:center;padding:20px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.product{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{color:#22c55e;font-weight:bold}

.btn{
display:block;
margin-top:8px;
padding:8px;
background:#7c3aed;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.admin{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#fff;
padding:15px;
overflow:auto;
display:none;
box-shadow:-2px 0 10px rgba(0,0,0,.2);
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:#fff;
padding:12px;
border-radius:50%;
border:none;
cursor:pointer;
}

.cart{
position:fixed;
left:10px;
bottom:10px;
background:white;
padding:10px;
width:250px;
box-shadow:0 0 10px rgba(0,0,0,.2);
border-radius:10px;
font-size:12px;
}

.checkout{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:#fff;
padding:12px;
border-radius:50%;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>BEST IMPORTS PRO</h2>
</header>

<div class="products" id="produtos"></div>

<div class="cart" id="cart">Carrinho vazio</div>

<button class="checkout" onclick="finalizarCompra()">🛒</button>

<button class="admin-btn" onclick="abrirAdmin()">⚙️</button>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input id="imagem" placeholder="Imagem URL"><br><br>

<button onclick="add()">Adicionar</button>

<hr>

<h4>Produtos</h4>
<div id="listaAdmin"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJECT.firebaseapp.com",
  projectId: "SEU_PROJECT",
  storageBucket: "SEU_PROJECT.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrinho = [];

// 🛍️ CARREGAR PRODUTOS
function carregar(){

  let div = document.getElementById("produtos");
  div.innerHTML = "";

  db.collection("produtos").get().then(snapshot=>{

    snapshot.forEach(doc=>{
      let p = doc.data();

      div.innerHTML += `
      <div class="product">
        <img src="${p.imagem}">
        <h3>${p.nome}</h3>
        <div class="price">${p.preco}</div>

        <button onclick="addCarrinho('${p.nome}','${p.preco}')">
          + Carrinho
        </button>

        <a class="btn"
        href="https://wa.me/5585982241638?text=Quero ${p.nome}">
        Comprar
        </a>
      </div>
      `;
    });

  });

}

// ➕ CARRINHO
function addCarrinho(nome,preco){
  carrinho.push({nome,preco});
  atualizarCarrinho();
}

// 🧠 CARRINHO UI
function atualizarCarrinho(){

  let div = document.getElementById("cart");
  let total = 0;
  let html = "";

  carrinho.forEach(item=>{
    total += parseFloat(item.preco);
    html += `${item.nome} - R$ ${item.preco}<br>`;
  });

  div.innerHTML = html + "<hr>Total: R$ " + total.toFixed(2);

}

// 📲 FINALIZAR WHATSAPP
function finalizarCompra(){

  if(carrinho.length === 0){
    alert("Carrinho vazio!");
    return;
  }

  let msg = "🛒 Pedido Best Imports%0A%0A";
  let total = 0;

  carrinho.forEach((item,i)=>{
    msg += `${i+1}. ${item.nome} - R$ ${item.preco}%0A`;
    total += parseFloat(item.preco);
  });

  msg += `%0A💰 Total: R$ ${total.toFixed(2)}`;

  window.open("https://wa.me/5585982241638?text=" + msg, "_blank");
}

// 🔐 ADMIN
function abrirAdmin(){
  let senha = prompt("Senha:");
  if(senha === "1234"){
    document.getElementById("admin").style.display = "block";
    carregarAdmin();
  }
}

// ➕ ADD
function add(){

  db.collection("produtos").add({
    nome:nome.value,
    preco:preco.value,
    imagem:imagem.value
  });

  carregar();
  carregarAdmin();
}

// 📦 ADMIN LIST
function carregarAdmin(){

  let div = document.getElementById("listaAdmin");
  div.innerHTML = "";

  db.collection("produtos").get().then(snapshot=>{

    snapshot.forEach(doc=>{
      let p = doc.data();

      div.innerHTML += `
      <div style="border:1px solid #ddd;padding:8px;margin-bottom:10px">
        <b>${p.nome}</b><br>
        R$ ${p.preco}<br>

        <button onclick="editar('${doc.id}','${p.nome}','${p.preco}','${p.imagem}')">
          Editar
        </button>

        <button onclick="deletar('${doc.id}')">
          Excluir
        </button>
      </div>
      `;
    });

  });

}

// ✏️ EDITAR
function editar(id,nomeAtual,precoAtual,imgAtual){

  let n = prompt("Nome:",nomeAtual);
  let p = prompt("Preço:",precoAtual);
  let i = prompt("Imagem:",imgAtual);

  db.collection("produtos").doc(id).update({
    nome:n,
    preco:p,
    imagem:i
  });

  carregar();
  carregarAdmin();
}

// ❌ DELETAR
function deletar(id){
  db.collection("produtos").doc(id).delete();
  carregar();
  carregarAdmin();
}

carregar();

</script>

</body>
</html>
