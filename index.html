<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Store Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#ff4d4f;color:#fff;padding:20px;text-align:center}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{color:#22c55e;font-weight:bold}

.btn{
display:block;
margin-top:8px;
padding:8px;
background:#ff4d4f;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:8px;
}

.admin{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#fff;
padding:20px;
display:none;
overflow:auto;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d4f;
color:#fff;
padding:12px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>SHOPEE STORE PRO</h2>
</header>

<div class="products" id="produtos"></div>

<div class="admin-btn" onclick="login()">⚙️</div>

<div class="admin" id="admin">

<h3>Admin Login</h3>

<input id="email" placeholder="email"><br><br>
<input id="senha" type="password" placeholder="senha"><br><br>

<button onclick="entrar()">Entrar</button>

<hr>

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input type="file" id="file"><br><br>

<button onclick="add()">Salvar</button>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getAuth, signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 SUA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID",
  storageBucket: "SEU_BUCKET",
  appId: "SEU_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔐 LOGIN
window.login = function(){
  document.getElementById("admin").style.display="block";
}

window.entrar = function(){
  signInWithEmailAndPassword(auth,email.value,senha.value)
  .then(()=>{
    alert("Logado!");
    carregar();
  })
  .catch(()=>alert("Erro login"));
}

// 📷 UPLOAD IMAGEM + ADD PRODUTO
window.add = async function(){

const file = document.getElementById("file").files[0];

const storageRef = ref(storage, "produtos/" + file.name);
await uploadBytes(storageRef, file);
const url = await getDownloadURL(storageRef);

await addDoc(collection(db,"produtos"),{
  nome:nome.value,
  preco:preco.value,
  imagem:url
});

alert("Produto salvo!");
carregar();
}

// 🛍️ LISTAR
async function carregar(){

let div = document.getElementById("produtos");
div.innerHTML="";

const snap = await getDocs(collection(db,"produtos"));

snap.forEach(d=>{
let p = d.data();

div.innerHTML += `
<div class="card">
<img src="${p.imagem}">
<h3>${p.nome}</h3>
<div class="price">${p.preco}</div>

<a class="btn"
href="https://wa.me/5585982241638?text=Quero ${p.nome}">
Comprar
</a>
</div>
`;
});

}

carregar();

</script>

</body>
</html>
