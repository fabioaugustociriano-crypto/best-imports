<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Imports Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#7c3aed;color:#fff;text-align:center;padding:20px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.product{
background:#fff;
border-radius:12px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{color:#22c55e;font-weight:bold}

.btn{
display:block;
margin-top:8px;
padding:8px;
background:#7c3aed;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:#fff;
padding:12px;
border-radius:50%;
cursor:pointer;
}

.admin{
position:fixed;
top:0;
right:0;
width:300px;
height:100%;
background:#fff;
padding:20px;
display:none;
overflow:auto;
}
</style>
</head>

<body>

<header>
<h2>BEST IMPORTS PRO</h2>
</header>

<!-- FILTRO -->
<select id="filtro" onchange="carregar()" style="margin:10px;">
<option value="todos">Todos</option>
<option value="perfume">Perfume</option>
<option value="monjauro">Monjauro</option>
</select>

<div class="products" id="produtos"></div>

<div class="admin-btn" onclick="abrir()">⚙️</div>

<div class="admin" id="admin">

<h3>Admin</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input id="categoria" placeholder="Categoria"><br><br>

<input id="imagem" placeholder="Link imagem"><br><br>
<input type="file" id="file" accept="image/*"><br><br>

<button onclick="add()">Salvar</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID",
  storageBucket: "SEU_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

let imagemBase64 = "";

// 📷 imagem galeria
document.getElementById("file").addEventListener("change", e=>{
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = x=> imagemBase64 = x.target.result;
  reader.readAsDataURL(file);
});

// ⚙️ abrir admin
function abrir(){
  if(prompt("Senha:") === "1234"){
    document.getElementById("admin").style.display="block";
  }
}

// 📤 upload imagem real
async function uploadImagem(file){

  let ref = storage.ref("produtos/" + Date.now() + file.name);
  await ref.put(file);

  return await ref.getDownloadURL();
}

// ➕ adicionar produto
async function add(){

  let file = document.getElementById("file").files[0];
  let url = imagemBase64;

  if(file){
    url = await uploadImagem(file);
  }

  db.collection("produtos").add({
    nome:nome.value,
    preco:preco.value,
    categoria:categoria.value || "geral",
    imagem:url,
    createdAt:Date.now()
  });

  alert("Produto salvo!");
  carregar();
}

// 🛍️ carregar produtos
function carregar(){

  let div = document.getElementById("produtos");
  div.innerHTML = "";

  let filtro = document.getElementById("filtro").value;

  db.collection("produtos")
  .orderBy("createdAt","desc")
  .get()
  .then(snapshot=>{

    snapshot.forEach(doc=>{
      let p = doc.data();

      if(filtro !== "todos" && p.categoria !== filtro) return;

      div.innerHTML += `
      <div class="product">
        <img src="${p.imagem}">
        <h3>${p.nome}</h3>
        <div class="price">${p.preco}</div>

        <button onclick="editar('${doc.id}','${p.nome}','${p.preco}','${p.imagem}')">
          Editar
        </button>

        <button onclick="deletar('${doc.id}')">
          Excluir
        </button>

        <a class="btn"
        href="https://wa.me/5585982241638?text=Quero ${p.nome}">
        Comprar
        </a>
      </div>
      `;
    });

  });
}

// ✏️ editar
function editar(id,nomeAtual,precoAtual,imgAtual){

  let n = prompt("Nome:",nomeAtual);
  let p = prompt("Preço:",precoAtual);
  let i = prompt("Imagem:",imgAtual);

  db.collection("produtos").doc(id).update({
    nome:n,
    preco:p,
    imagem:i
  });

  carregar();
}

// ❌ deletar
function deletar(id){
  db.collection("produtos").doc(id).delete();
  carregar();
}

carregar();

</script>

</body>
</html>
