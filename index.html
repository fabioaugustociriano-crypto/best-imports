<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Best Imports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#000; color:#fff; padding:15px; text-align:center; }
.container { padding:20px; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.card { background:#fff; padding:10px; border-radius:10px; text-align:center; }
.card img { width:100%; border-radius:10px; }
button { background:#000; color:#fff; border:none; padding:10px; margin-top:10px; cursor:pointer; border-radius:5px; }
#cart { position:fixed; right:10px; top:10px; background:#fff; padding:10px; border-radius:10px; }
#admin { display:none; background:#fff; padding:15px; margin-top:20px; border-radius:10px; }
input, select { padding:8px; margin:5px 0; width:100%; }
</style>
</head>
<body>

<header>
<h1>Best Imports</h1>
<button onclick="login()">Admin</button>
<button onclick="logout()">Sair</button>
</header>

<div id="cart">
🛒 <span id="cartCount">0</span>
<button onclick="sendWhats()">Finalizar</button>
</div>

<div class="container">

<select id="categoryFilter" onchange="renderProducts()">
  <option value="all">Todos</option>
  <option value="monjauro">Monjauro</option>
  <option value="perfume">Perfume</option>
</select>

<div class="products" id="productList"></div>

<div id="admin">
<h2>Painel Admin</h2>

<input type="text" id="newName" placeholder="Nome do produto">
<input type="number" id="newPrice" placeholder="Preço">
<input type="file" id="newImage">

<select id="newCategory">
  <option value="monjauro">Monjauro</option>
  <option value="perfume">Perfume</option>
</select>

<button onclick="addProduct()">Adicionar Produto</button>
</div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];
let logged = false;

function renderProducts() {
const list = document.getElementById("productList");
const filter = document.getElementById("categoryFilter").value;

list.innerHTML = "";

products
.filter(p => filter === "all" || p.category === filter)
.forEach((p, index) => {
list.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="addToCart(${index})">Comprar</button>
${logged ? `
<button onclick="editProduct(${index})">Editar</button>
<button onclick="deleteProduct(${index})">Excluir</button>
` : ""}
</div>
`;
});
}

function addToCart(index) {
cart.push(products[index]);
document.getElementById("cartCount").innerText = cart.length;
}

function addProduct() {
if (!logged) return alert("Faça login");

const name = document.getElementById("newName").value;
const price = document.getElementById("newPrice").value;
const file = document.getElementById("newImage").files[0];
const category = document.getElementById("newCategory").value;

const reader = new FileReader();
reader.onload = function(e) {
products.push({
name,
price,
category,
image: e.target.result
});

localStorage.setItem("products", JSON.stringify(products));
renderProducts();
};

if (file) reader.readAsDataURL(file);
}

function editProduct(index) {
if (!logged) return alert("Faça login");

const p = products[index];

const newName = prompt("Novo nome:", p.name);
const newPrice = prompt("Novo preço:", p.price);
const newCategory = prompt("Categoria (monjauro ou perfume):", p.category);

if (newName) p.name = newName;
if (newPrice) p.price = newPrice;
if (newCategory) p.category = newCategory;

if (confirm("Deseja trocar a imagem?")) {
const input = document.createElement("input");
input.type = "file";

input.onchange = e => {
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(ev) {
p.image = ev.target.result;
saveProducts();
};

reader.readAsDataURL(file);
};

input.click();
} else {
saveProducts();
}
}

function deleteProduct(index) {
if (!logged) return alert("Faça login");

if (confirm("Tem certeza que deseja excluir este produto?")) {
products.splice(index, 1);
saveProducts();
}
}

function saveProducts() {
localStorage.setItem("products", JSON.stringify(products));
renderProducts();
}

function login() {
const user = prompt("Usuário:");
const pass = prompt("Senha:");

if (user === "admin" && pass === "1234") {
logged = true;
document.getElementById("admin").style.display = "block";
alert("Logado!");
} else {
alert("Senha incorreta");
}
}

function logout() {
logged = false;
document.getElementById("admin").style.display = "none";
}

function sendWhats() {
let msg = "Pedido:%0A";

cart.forEach(p => {
msg += `- ${p.name} R$${p.price}%0A`;
});

window.open(`https://wa.me/5585982241638?text=${msg}`);
}

renderProducts();
</script>

</body>
</html>
