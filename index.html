<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Pro Shopee</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

header{
background:#111827;
color:#fff;
padding:15px;
text-align:center;
position:relative;
}

#gear{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
}

.grid{display:grid;gap:10px;padding:10px}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:10px}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.cat{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.cat button{
background:#fff;
color:#000;
border-radius:20px;
padding:8px 12px;
}

/* CART */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:#fff;
padding:15px;
border-radius:50%;
cursor:pointer;
}

/* ADMIN */
#admin{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.adminBox{
background:#fff;
padding:15px;
width:90%;
max-width:600px;
border-radius:10px;
}

/* DASHBOARD */
#dashboard{
padding:10px;
background:#fff;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
🛍️ Loja Pro Shopee
<div id="gear" onclick="openAdmin()">⚙️</div>
</header>

<div class="cat">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('Perfume')">Perfume</button>
<button onclick="filter('Monjauro')">Monjauro</button>
</div>

<div class="grid" id="list"></div>

<div id="cartBtn" onclick="checkout()">🛒 Finalizar</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h3>📊 Dashboard</h3>
<p>Total vendas: R$ <span id="totalSales">0</span></p>
<div id="orders"></div>
</div>

<!-- ADMIN -->
<div id="admin">
<div class="adminBox">

<h3>Admin</h3>

<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<input id="name" placeholder="Nome">
<input id="price" placeholder="Preço">
<input id="img" placeholder="Imagem URL">

<select id="cat">
<option>Perfume</option>
<option>Monjauro</option>
</select>

<button onclick="addProduct()">Adicionar</button>

</div>

<button onclick="closeAdmin()">Fechar</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU.firebaseapp.com",
  projectId: "SEU_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DADOS */
let products = [];
let cart = [];
let orders = [];
let filterCat = "all";

/* PRODUTOS */
onSnapshot(collection(db,"products"), snap=>{
products = [];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
render();
});

/* ORDERS */
onSnapshot(collection(db,"orders"), snap=>{
orders = [];
let total = 0;

snap.forEach(d=>{
let o = d.data();
orders.push({...o,id:d.id});
total += o.total;
});

document.getElementById("totalSales").innerText = total;
renderOrders();
});

/* FILTER */
window.filter = function(f){
filterCat=f;
render();
}

/* RENDER */
function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach(p=>{
if(filterCat!="all" && p.category!=filterCat) return;

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>R$ ${p.price}</p>
<button onclick="add('${p.id}')">Comprar</button>
</div>
</div>`;
});
}

/* CART */
window.add = function(id){
let p = products.find(x=>x.id===id);
let f = cart.find(x=>x.id===id);

if(f) f.qty++;
else cart.push({...p,qty:1});
}

/* CHECKOUT REAL */
window.checkout = async function(){

let total = cart.reduce((a,b)=>a+(b.price*b.qty),0);

await addDoc(collection(db,"orders"),{
items:cart,
total:total,
status:"pendente",
createdAt:Date.now()
});

alert("Pedido enviado!");
cart = [];
}

/* ADMIN */
window.openAdmin = ()=>admin.style.display="flex";
window.closeAdmin = ()=>admin.style.display="none";

window.login = function(){
if(pass.value=="1234"){
panel.style.display="block";
}
}

/* ADD PRODUCT */
window.addProduct = async function(){
await addDoc(collection(db,"products"),{
name:name.value,
price:Number(price.value),
img:img.value,
category:cat.value
});
}

/* DASHBOARD */
function renderOrders(){
let box=document.getElementById("orders");
box.innerHTML="";

orders.forEach(o=>{
box.innerHTML+=`
<div style="border:1px solid #ddd;padding:10px;margin:5px">
<b>Total: R$ ${o.total}</b><br>
Status: ${o.status}

<button onclick="setStatus('${o.id}','enviado')">Enviar</button>
</div>`;
});
}

/* STATUS */
window.setStatus = async function(id,status){
await updateDoc(doc(db,"orders",id),{status});
}

</script>

</body>
</html>
